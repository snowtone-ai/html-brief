<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Feature flag editor</title>
<style>
:root{--md-primary:#1a73e8;--md-on-primary:#fff;--md-primary-container:#d2e3fc;--md-on-primary-container:#062e6f;--md-surface:#fff;--md-surface-dim:#f8f9fa;--md-surface-container:#f1f3f4;--md-surface-container-high:#e8eaed;--md-on-surface:#202124;--md-on-surface-variant:#5f6368;--md-outline:#dadce0;--md-outline-variant:#e8eaed;--md-background:#fff;--md-error:#d93025;--md-error-container:#fce8e6;--md-on-error-container:#5c0a02;--md-success:#1e8e3e;--md-success-container:#e6f4ea;--md-on-success-container:#0d652d;--md-warning:#e37400;--md-warning-container:#fef7e0;--md-on-warning-container:#5e3700;--md-info:#1a73e8;--md-info-container:#e8f0fe;--md-on-info-container:#062e6f;--md-font:'Google Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--md-font-mono:'Roboto Mono',ui-monospace,SFMono-Regular,Consolas,monospace;--md-shape-sm:8px;--md-shape-md:12px;--md-shape-full:9999px;--md-elevation-1:0 1px 2px 0 rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15);--md-elevation-2:0 1px 2px 0 rgba(60,64,67,.3),0 2px 6px 2px rgba(60,64,67,.15);--md-elevation-3:0 4px 8px 3px rgba(60,64,67,.15),0 1px 3px rgba(60,64,67,.3);--md-content-width:960px}
@media(prefers-color-scheme:dark){:root{--md-primary:#8ab4f8;--md-on-primary:#062e6f;--md-primary-container:#185abc;--md-on-primary-container:#d2e3fc;--md-surface:#202124;--md-surface-dim:#17181a;--md-surface-container:#292a2d;--md-surface-container-high:#35363a;--md-on-surface:#e8eaed;--md-on-surface-variant:#9aa0a6;--md-outline:#5f6368;--md-outline-variant:#3c4043;--md-background:#17181a;--md-error:#f28b82;--md-error-container:#5c0a02;--md-on-error-container:#fce8e6;--md-success:#81c995;--md-success-container:#0d652d;--md-on-success-container:#e6f4ea;--md-warning:#fdd663;--md-warning-container:#5e3700;--md-on-warning-container:#fef7e0;--md-info:#8ab4f8;--md-info-container:#062e6f;--md-on-info-container:#e8f0fe;--md-elevation-1:0 1px 3px 1px rgba(0,0,0,.5),0 1px 2px rgba(0,0,0,.6);--md-elevation-2:0 2px 6px 2px rgba(0,0,0,.5),0 1px 2px rgba(0,0,0,.6);--md-elevation-3:0 4px 8px 3px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.5)}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0} body{font-family:var(--md-font);font-size:14px;line-height:1.5;color:var(--md-on-surface);background:var(--md-background);-webkit-font-smoothing:antialiased;padding-bottom:6rem}
.brief-container{max-width:var(--md-content-width);margin:0 auto;padding:0 24px}
.top-bar{position:sticky;top:0;z-index:10;background:var(--md-surface);border-bottom:1px solid var(--md-outline-variant);padding:12px 24px;display:flex;align-items:center;gap:16px} .top-bar-label{font-size:11px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--md-on-surface-variant)} .top-bar-spacer{flex:1} .top-bar-title{font-size:16px;font-weight:500;color:var(--md-on-surface);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hero{padding:48px 0 32px} .hero h1{font-size:36px;font-weight:400;line-height:1.2;letter-spacing:-.5px;margin-bottom:12px} .hero-summary{font-size:16px;line-height:1.6;color:var(--md-on-surface-variant);max-width:680px}
.state-indicator{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px} .meta-chip{display:inline-flex;align-items:center;padding:6px 12px;border-radius:var(--md-shape-sm);font-size:12px;font-weight:600;line-height:1} .meta-chip[data-tone="info"]{background:var(--md-info-container);color:var(--md-on-info-container)} .meta-chip[data-tone="success"]{background:var(--md-success-container);color:var(--md-on-success-container)} .meta-chip[data-tone="warning"]{background:var(--md-warning-container);color:var(--md-on-warning-container)}
main{display:flex;flex-direction:column;gap:16px}
.editor-layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:16px;align-items:start}
.card{background:var(--md-surface);border-radius:var(--md-shape-md);box-shadow:var(--md-elevation-1);padding:24px} .card h2{font-size:22px;font-weight:400;margin-bottom:16px}
fieldset{border:1px solid var(--md-outline-variant);border-radius:var(--md-shape-sm);padding:16px;margin:0 0 12px} legend{font-family:var(--md-font);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--md-on-surface-variant);padding:0 6px}
.flag-card{display:grid;grid-template-columns:auto 1fr;gap:12px;padding:12px 0;border-bottom:1px solid var(--md-outline-variant)} .flag-card:last-child{border-bottom:none} .flag-card input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--md-primary);cursor:pointer} .flag-card strong{font-size:14px;font-weight:500} .flag-card p{margin:4px 0 0;font-size:12px;color:var(--md-on-surface-variant);line-height:1.4} .dependency{font-size:11px;color:var(--md-on-surface-variant);margin-top:4px;display:block}
.preview-panel{position:sticky;top:68px;background:var(--md-surface);border-radius:var(--md-shape-md);box-shadow:var(--md-elevation-1);padding:24px} .preview-panel h2{font-size:16px;font-weight:500;margin-bottom:12px}
pre{background:var(--md-surface-dim);border-radius:var(--md-shape-sm);padding:16px;overflow:auto;font-family:var(--md-font-mono);font-size:13px}
#warnings{list-style:none;padding:0} #warnings li{padding:8px 0;font-size:13px;border-bottom:1px solid var(--md-outline-variant)} #warnings li:last-child{border-bottom:none}
.export-bar{position:fixed;left:0;right:0;bottom:0;background:var(--md-surface);border-top:1px solid var(--md-outline-variant);padding:8px 24px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;z-index:10} .btn-tonal{display:inline-flex;align-items:center;height:40px;padding:0 24px;border:none;border-radius:var(--md-shape-full);background:var(--md-primary-container);color:var(--md-on-primary-container);font-family:var(--md-font);font-size:14px;font-weight:500;cursor:pointer;transition:box-shadow 120ms} .btn-tonal:hover{box-shadow:var(--md-elevation-1)} .btn-outlined{display:inline-flex;align-items:center;height:40px;padding:0 24px;border:1px solid var(--md-outline);border-radius:var(--md-shape-full);background:transparent;color:var(--md-primary);font-family:var(--md-font);font-size:14px;font-weight:500;cursor:pointer;transition:background 120ms} .btn-outlined:hover{background:var(--md-info-container)}
#copy-toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--md-on-surface);color:var(--md-surface);padding:10px 24px;border-radius:var(--md-shape-sm);font-family:var(--md-font);font-size:14px;z-index:20;box-shadow:var(--md-elevation-3)}
@media(max-width:820px){.editor-layout{grid-template-columns:1fr} .preview-panel{position:static} .brief-container{padding:0 16px} .hero{padding:32px 0 24px} .hero h1{font-size:28px} .card{padding:16px}}
@media print{.top-bar,.export-bar,button{display:none!important} body{background:white;color:#202124;padding-bottom:0} .card,.preview-panel{box-shadow:none;border:1px solid #dadce0}}
</style></head>
<body data-brief-archetype="editor">
<div class="top-bar"><span class="top-bar-label">Editor Brief</span><span class="top-bar-spacer"></span><span class="top-bar-title">Feature Flags</span></div>
<div class="brief-container">
<header class="hero"><h1>Editor: Feature flags</h1><p class="hero-summary">Toggle flags, inspect dependency warnings, preview the resulting config, and copy the changed state back to an AI.</p><div class="state-indicator"><span class="meta-chip" data-tone="info" id="change-count">0 changes</span><span class="meta-chip" data-tone="success" id="warning-count">0 warnings</span></div></header>
<main>
<section class="editor-layout" id="editor-area">
<form id="editor-form" class="card">
<fieldset><legend>Runtime</legend>
<label class="flag-card"><input type="checkbox" data-flag="streamingResponses"><span><strong>Streaming responses</strong><p>Enable server-sent streaming responses.</p></span></label>
<label class="flag-card"><input type="checkbox" data-flag="streamingBackpressure"><span><strong>Streaming backpressure</strong><p>Protect streaming memory with queue high-water policy.</p><span class="dependency">Requires: Streaming responses</span></span></label>
</fieldset>
<fieldset><legend>Product</legend>
<label class="flag-card"><input type="checkbox" data-flag="newCheckout"><span><strong>New checkout</strong><p>Route checkout traffic to the new flow.</p></span></label>
</fieldset>
<fieldset><legend>Analytics</legend>
<label class="flag-card"><input type="checkbox" data-flag="checkoutMetricsV2"><span><strong>Checkout metrics v2</strong><p>Emit new checkout funnel events.</p><span class="dependency">Requires: New checkout</span></span></label>
</fieldset>
</form>
<aside class="preview-panel"><h2>Live Preview</h2><pre id="preview"></pre></aside>
</section>
<section class="card" id="validation" aria-live="polite"><h2>Validation Warnings</h2><ul id="warnings"><li>No warnings.</li></ul></section>
</main>
</div>
<section class="export-bar" aria-label="Export Bridge"><button class="btn-tonal" data-copy="prompt">Copy as Prompt</button><button class="btn-outlined" data-copy="json">Copy as JSON</button><button class="btn-outlined" data-copy="markdown">Copy as Markdown</button><button class="btn-outlined" data-action="reset">Reset</button></section>
<script type="application/json" id="brief-initial-state">{"version": "1.0", "archetype": "editor", "createdAt": "2026-05-15T00:00:00.000Z", "updatedAt": null, "userIntent": "Create a feature flag editor with full round-trip export.", "state": {"title": "Feature flag editor", "editorType": "feature-flags", "items": [{"id": "streamingResponses", "label": "Streaming responses", "group": "Runtime", "value": false, "initialValue": false, "dependsOn": [], "description": "Enable server-sent streaming responses."}, {"id": "streamingBackpressure", "label": "Streaming backpressure", "group": "Runtime", "value": false, "initialValue": false, "dependsOn": ["streamingResponses"], "description": "Protect streaming memory with queue high-water policy."}, {"id": "newCheckout", "label": "New checkout", "group": "Product", "value": true, "initialValue": true, "dependsOn": [], "description": "Route checkout traffic to the new flow."}, {"id": "checkoutMetricsV2", "label": "Checkout metrics v2", "group": "Analytics", "value": false, "initialValue": false, "dependsOn": ["newCheckout"], "description": "Emit new checkout funnel events."}], "changedKeys": [], "validation": {"warnings": [], "errors": []}, "exportSummary": "No changes yet."}, "initialState": {"title": "Feature flag editor", "editorType": "feature-flags", "items": [{"id": "streamingResponses", "label": "Streaming responses", "group": "Runtime", "value": false, "initialValue": false, "dependsOn": [], "description": "Enable server-sent streaming responses."}, {"id": "streamingBackpressure", "label": "Streaming backpressure", "group": "Runtime", "value": false, "initialValue": false, "dependsOn": ["streamingResponses"], "description": "Protect streaming memory with queue high-water policy."}, {"id": "newCheckout", "label": "New checkout", "group": "Product", "value": true, "initialValue": true, "dependsOn": [], "description": "Route checkout traffic to the new flow."}, {"id": "checkoutMetricsV2", "label": "Checkout metrics v2", "group": "Analytics", "value": false, "initialValue": false, "dependsOn": ["newCheckout"], "description": "Emit new checkout funnel events."}], "changedKeys": [], "validation": {"warnings": [], "errors": []}, "exportSummary": "No changes yet."}}</script>
<script>
(function(){
var initialEnvelope=JSON.parse(document.getElementById('brief-initial-state').textContent);
var initialItems=initialEnvelope.state.items;
function byId(id){return initialItems.find(function(x){return x.id===id})}
function setControlsFrom(items){items.forEach(function(item){var input=document.querySelector('[data-flag="'+item.id+'"]');if(input)input.checked=!!item.value})}
function gatherCurrentState(){var items=initialItems.map(function(item){var input=document.querySelector('[data-flag="'+item.id+'"]');return Object.assign({},item,{value:!!input.checked})});var changedKeys=items.filter(function(i){return i.value!==i.initialValue}).map(function(i){return i.id});var validation=validate(items);return{title:'Feature flag editor',editorType:'feature-flags',items:items,changedKeys:changedKeys,validation:validation,exportSummary:changedKeys.length?changedKeys.length+' flag(s) changed':'No changes yet.'}}
function validate(items){var warnings=[];var errors=[];function on(id){return items.find(function(i){return i.id===id}).value}if(on('streamingBackpressure')&&!on('streamingResponses'))warnings.push('Streaming backpressure requires Streaming responses.');if(on('checkoutMetricsV2')&&!on('newCheckout'))warnings.push('Checkout metrics v2 requires New checkout.');return{warnings:warnings,errors:errors}}
function envelope(){return{version:'1.0',archetype:'editor',createdAt:initialEnvelope.createdAt,updatedAt:new Date().toISOString(),userIntent:initialEnvelope.userIntent,state:gatherCurrentState(),initialState:initialEnvelope.state}}
function render(){var s=gatherCurrentState();document.getElementById('preview').textContent=JSON.stringify(Object.fromEntries(s.items.map(function(i){return[i.id,i.value]})),null,2);document.getElementById('change-count').textContent=s.changedKeys.length+' changes';var wc=document.getElementById('warning-count');wc.textContent=s.validation.warnings.length+' warnings';wc.dataset.tone=s.validation.warnings.length?'warning':'success';var list=document.getElementById('warnings');list.innerHTML=s.validation.warnings.length?s.validation.warnings.map(function(w){return '<li><span class="meta-chip" data-tone="warning" style="font-size:11px;padding:3px 8px;margin-right:6px">Warning</span> '+w+'</li>'}).join(''):'<li>No warnings.</li>'}
function diffLines(s){return s.items.filter(function(i){return i.value!==i.initialValue}).map(function(i){return '- `'+i.id+'`: `'+i.initialValue+'` \u2192 `'+i.value+'`'})}
function markdown(e){var s=e.state;return '# Edited State: '+s.title+'\n\n## Changed Keys\n'+(diffLines(s).join('\n')||'- No changes')+'\n\n## Validation Notes\n'+(s.validation.warnings.map(function(w){return '- '+w}).join('\n')||'- No warnings')}
function prompt(e){return ['The user edited the following data in an HTML brief.','','User intent:',e.userIntent,'','Initial state:',JSON.stringify(e.initialState,null,2),'','Current state:',JSON.stringify(e.state,null,2),'','Changed keys:',e.state.changedKeys.join(', ')||'None','','Validation notes:',e.state.validation.warnings.join('\n')||'None','','Please apply these changes.'].join('\n')}
function toast(m){var t=document.getElementById('copy-toast');if(!t){t=document.createElement('div');t.id='copy-toast';t.setAttribute('role','status');document.body.appendChild(t)}t.textContent=m;clearTimeout(window.__t);window.__t=setTimeout(function(){t.textContent=''},1800)}
function copy(text,label){if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){toast('Copied '+label)}).catch(function(){fallback(text,label)});else fallback(text,label)}
function fallback(text,label){var a=document.createElement('textarea');a.value=text;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove();toast('Copied '+label)}
document.addEventListener('change',function(e){if(e.target.matches('[data-flag]'))render()});
document.addEventListener('click',function(e){var b=e.target.closest('[data-copy],[data-action]');if(!b)return;if(b.dataset.action==='reset'){setControlsFrom(initialItems);render();toast('Reset to initial state');return}var env=envelope();var m=b.dataset.copy;if(m==='json')copy(JSON.stringify(env,null,2),'JSON');if(m==='markdown')copy(markdown(env),'Markdown');if(m==='prompt')copy(prompt(env),'Prompt')});
setControlsFrom(initialItems);render();
})();
</script>
</body></html>
