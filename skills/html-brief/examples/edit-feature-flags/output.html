<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Feature flag editor</title>
<style>
:root{--bg:#fafaf9;--fg:#1c1917;--muted:#57534e;--surface:#fff;--subtle:#f5f5f4;--border:#e7e5e4;--success:#047857;--success-bg:#ecfdf5;--warning:#b45309;--warning-bg:#fffbeb;--danger:#b91c1c;--danger-bg:#fef2f2;--info:#1d4ed8;--info-bg:#eff6ff;--radius:16px;--wide:1100px;--ui:system-ui,-apple-system,Segoe UI,sans-serif;--mono:ui-monospace,SFMono-Regular,Consolas,monospace}
@media(prefers-color-scheme:dark){:root{--bg:#0c0a09;--fg:#e7e5e4;--muted:#a8a29e;--surface:#1c1917;--subtle:#292524;--border:#44403c;--success:#34d399;--success-bg:#064e3b;--warning:#fbbf24;--warning-bg:#451a03;--danger:#f87171;--danger-bg:#450a0a;--info:#60a5fa;--info-bg:#172554}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.6 Georgia,serif;padding-bottom:6rem}h1,h2,h3,button,label,.eyebrow,.badge,.state-indicator{font-family:var(--ui)}.hero,main,.export-bar{width:min(var(--wide),calc(100% - 2rem));margin:auto}.hero{padding:3rem 0 1rem}.eyebrow{color:var(--info);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.8rem}h1{font-size:clamp(2rem,5vw,4rem);line-height:1.05;margin:.2rem 0 1rem}.hero-summary{font-size:1.2rem;max-width:74ch}.state-indicator{display:flex;gap:.5rem;flex-wrap:wrap}.badge{display:inline-block;border-radius:999px;padding:.2rem .55rem;font-size:.8rem;font-weight:800}.success{background:var(--success-bg);color:var(--success)}.warning{background:var(--warning-bg);color:var(--warning)}.danger{background:var(--danger-bg);color:var(--danger)}.info{background:var(--info-bg);color:var(--info)}main{display:grid;gap:1rem}.editor-layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:1rem;align-items:start}.panel,fieldset,.preview-panel,.flag-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}fieldset{margin:0 0 1rem;border-color:var(--border)}legend{font-family:var(--ui);font-weight:800;padding:0 .4rem}.flag-card{display:grid;grid-template-columns:auto 1fr;gap:.8rem;margin:.7rem 0}.flag-card input{width:1.2rem;height:1.2rem;margin-top:.35rem}.flag-card p{margin:.2rem 0;color:var(--muted)}.dependency{font-family:var(--ui);font-size:.85rem;color:var(--muted)}.preview-panel{position:sticky;top:1rem}pre{background:var(--subtle);border:1px solid var(--border);border-radius:12px;padding:1rem;overflow:auto;font-family:var(--mono);font-size:.85rem}#warnings li{margin:.4rem 0}.export-bar{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:.8rem;display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;z-index:3}button{border:1px solid var(--border);background:var(--subtle);color:var(--fg);border-radius:10px;padding:.55rem .8rem;cursor:pointer}#copy-toast{position:fixed;right:1rem;bottom:5.5rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;font-family:var(--ui)}@media(max-width:820px){.editor-layout{grid-template-columns:1fr}.preview-panel{position:static}.hero,main,.export-bar{width:min(100% - 1rem,var(--wide))}}@media print{.export-bar,button{display:none!important}body{background:white;color:black;padding-bottom:0}}
</style></head>
<body data-brief-archetype="editor">
<header class="hero"><p class="eyebrow">Editor Brief</p><h1>Editor: Feature flags</h1><p class="hero-summary">Toggle flags, inspect dependency warnings, preview the resulting config, and copy the changed state back to an AI.</p><div class="state-indicator"><span class="badge info" id="change-count">0 changes</span><span class="badge success" id="warning-count">0 warnings</span></div></header>
<main>
<section class="editor-layout" id="editor-area">
<form id="editor-form" class="panel">
<fieldset><legend>Runtime</legend>
<label class="flag-card"><input type="checkbox" data-flag="streamingResponses"><span><strong>Streaming responses</strong><p>Enable server-sent streaming responses.</p></span></label>
<label class="flag-card"><input type="checkbox" data-flag="streamingBackpressure"><span><strong>Streaming backpressure</strong><p>Protect streaming memory with queue high-water policy.</p><span class="dependency">Requires: Streaming responses</span></span></label>
</fieldset>
<fieldset><legend>Product</legend>
<label class="flag-card"><input type="checkbox" data-flag="newCheckout"><span><strong>New checkout</strong><p>Route checkout traffic to the new flow.</p></span></label>
</fieldset>
<fieldset><legend>Analytics</legend>
<label class="flag-card"><input type="checkbox" data-flag="checkoutMetricsV2"><span><strong>Checkout metrics v2</strong><p>Emit new checkout funnel events.</p><span class="dependency">Requires: New checkout</span></span></label>
</fieldset>
</form>
<aside class="preview-panel"><h2>Live Preview</h2><pre id="preview"></pre></aside>
</section>
<section class="panel" id="validation" aria-live="polite"><h2>Validation Warnings</h2><ul id="warnings"><li>No warnings.</li></ul></section>
</main>
<section class="export-bar" aria-label="Export Bridge"><button data-copy="prompt">Copy as Prompt</button><button data-copy="json">Copy as JSON</button><button data-copy="markdown">Copy as Markdown</button><button data-action="reset">Reset</button></section>
<script type="application/json" id="brief-initial-state">{"version": "1.0", "archetype": "editor", "createdAt": "2026-05-15T00:00:00.000Z", "updatedAt": null, "userIntent": "Create a feature flag editor with full round-trip export.", "state": {"title": "Feature flag editor", "editorType": "feature-flags", "items": [{"id": "streamingResponses", "label": "Streaming responses", "group": "Runtime", "value": false, "initialValue": false, "dependsOn": [], "description": "Enable server-sent streaming responses."}, {"id": "streamingBackpressure", "label": "Streaming backpressure", "group": "Runtime", "value": false, "initialValue": false, "dependsOn": ["streamingResponses"], "description": "Protect streaming memory with queue high-water policy."}, {"id": "newCheckout", "label": "New checkout", "group": "Product", "value": true, "initialValue": true, "dependsOn": [], "description": "Route checkout traffic to the new flow."}, {"id": "checkoutMetricsV2", "label": "Checkout metrics v2", "group": "Analytics", "value": false, "initialValue": false, "dependsOn": ["newCheckout"], "description": "Emit new checkout funnel events."}], "changedKeys": [], "validation": {"warnings": [], "errors": []}, "exportSummary": "No changes yet."}, "initialState": {"title": "Feature flag editor", "editorType": "feature-flags", "items": [{"id": "streamingResponses", "label": "Streaming responses", "group": "Runtime", "value": false, "initialValue": false, "dependsOn": [], "description": "Enable server-sent streaming responses."}, {"id": "streamingBackpressure", "label": "Streaming backpressure", "group": "Runtime", "value": false, "initialValue": false, "dependsOn": ["streamingResponses"], "description": "Protect streaming memory with queue high-water policy."}, {"id": "newCheckout", "label": "New checkout", "group": "Product", "value": true, "initialValue": true, "dependsOn": [], "description": "Route checkout traffic to the new flow."}, {"id": "checkoutMetricsV2", "label": "Checkout metrics v2", "group": "Analytics", "value": false, "initialValue": false, "dependsOn": ["newCheckout"], "description": "Emit new checkout funnel events."}], "changedKeys": [], "validation": {"warnings": [], "errors": []}, "exportSummary": "No changes yet."}}</script>
<script>
(function(){
const initialEnvelope=JSON.parse(document.getElementById('brief-initial-state').textContent);
const initialItems=initialEnvelope.state.items;
function byId(id){return initialItems.find(x=>x.id===id)}
function setControlsFrom(items){items.forEach(item=>{const input=document.querySelector('[data-flag="'+item.id+'"]');if(input)input.checked=!!item.value})}
function gatherCurrentState(){const items=initialItems.map(item=>{const input=document.querySelector('[data-flag="'+item.id+'"]');return Object.assign({},item,{value:!!input.checked})});const changedKeys=items.filter(i=>i.value!==i.initialValue).map(i=>i.id);const validation=validate(items);return {title:'Feature flag editor',editorType:'feature-flags',items,changedKeys,validation,exportSummary: changedKeys.length? changedKeys.length+' flag(s) changed':'No changes yet.'}}
function validate(items){const warnings=[];const errors=[];function on(id){return items.find(i=>i.id===id).value} if(on('streamingBackpressure')&&!on('streamingResponses'))warnings.push('Streaming backpressure requires Streaming responses.'); if(on('checkoutMetricsV2')&&!on('newCheckout'))warnings.push('Checkout metrics v2 requires New checkout.'); return {warnings,errors}}
function envelope(){return {version:'1.0',archetype:'editor',createdAt:initialEnvelope.createdAt,updatedAt:new Date().toISOString(),userIntent:initialEnvelope.userIntent,state:gatherCurrentState(),initialState:initialEnvelope.state}}
function render(){const s=gatherCurrentState();document.getElementById('preview').textContent=JSON.stringify(Object.fromEntries(s.items.map(i=>[i.id,i.value])),null,2);document.getElementById('change-count').textContent=s.changedKeys.length+' changes';const wc=document.getElementById('warning-count');wc.textContent=s.validation.warnings.length+' warnings';wc.className='badge '+(s.validation.warnings.length?'warning':'success');const list=document.getElementById('warnings');list.innerHTML=s.validation.warnings.length?s.validation.warnings.map(w=>'<li><span class="badge warning">Warning</span> '+w+'</li>').join(''):'<li>No warnings.</li>'}
function diffLines(s){return s.items.filter(i=>i.value!==i.initialValue).map(i=>'- `'+i.id+'`: `'+i.initialValue+'` → `'+i.value+'`')}
function markdown(e){const s=e.state;return '# Edited State: '+s.title+'\n\n## Changed Keys\n'+(diffLines(s).join('\n')||'- No changes')+'\n\n## Validation Notes\n'+(s.validation.warnings.map(w=>'- '+w).join('\n')||'- No warnings')}
function prompt(e){return ['The user edited the following data in an HTML brief.','','User intent:',e.userIntent,'','Initial state:',JSON.stringify(e.initialState,null,2),'','Current state:',JSON.stringify(e.state,null,2),'','Changed keys:',e.state.changedKeys.join(', ')||'None','','Validation notes:',e.state.validation.warnings.join('\n')||'None','','Please apply these changes.'].join('\n')}
function toast(m){let t=document.getElementById('copy-toast');if(!t){t=document.createElement('div');t.id='copy-toast';t.setAttribute('role','status');document.body.appendChild(t)}t.textContent=m;clearTimeout(window.__t);window.__t=setTimeout(()=>t.textContent='',1800)}
function copy(text,label){if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>toast('Copied '+label)).catch(()=>fallback(text,label));else fallback(text,label)}
function fallback(text,label){const a=document.createElement('textarea');a.value=text;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove();toast('Copied '+label)}
document.addEventListener('change',e=>{if(e.target.matches('[data-flag]'))render()});
document.addEventListener('click',e=>{const b=e.target.closest('[data-copy],[data-action]');if(!b)return;if(b.dataset.action==='reset'){setControlsFrom(initialItems);render();toast('Reset to initial state');return}const env=envelope();const m=b.dataset.copy;if(m==='json')copy(JSON.stringify(env,null,2),'JSON');if(m==='markdown')copy(markdown(env),'Markdown');if(m==='prompt')copy(prompt(env),'Prompt')});
setControlsFrom(initialItems);render();
})();
</script>
</body></html>
